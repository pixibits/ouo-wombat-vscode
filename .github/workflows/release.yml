name: Release VSIX

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"
          if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version ${VERSION}."
            echo "Expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          VSIX="ouo-wombat-vscode-${VERSION}.vsix"
          gh release create "${GITHUB_REF_NAME}" "${VSIX}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "VSIX release package for ${GITHUB_REF_NAME}."
